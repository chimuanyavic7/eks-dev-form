apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init
  namespace: eks-project
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: mongo:7
          command:
            - /bin/sh
            - -c
            - |
              echo "⏳ Waiting for MongoDB pods..."

              for host in mongoset-0.mongo.eks-project.svc.cluster.local mongoset-1.mongo.eks-project.svc.cluster.local; do
                echo "Checking $host..."
                for i in {1..60}; do
                  if mongosh --host $host:27017 --eval "db.adminCommand('ping')" >/dev/null 2>&1; then
                    echo "$host is ready"
                    break
                  fi
                  sleep 3
                done
              done

              echo "✅ MongoDB pods ready. Initializing replica set..."

              mongosh --host mongoset-0.mongo.eks-project.svc.cluster.local:27017 --eval '
                const config = {
                  _id: "rs0",
                  members: [
                    { _id: 0, host: "mongoset-0.mongo.eks-project.svc.cluster.local:27017" },
                    { _id: 1, host: "mongoset-1.mongo.eks-project.svc.cluster.local:27017" }
                  ]
                };

                let initialized = false;

                try {
                  rs.status();
                  initialized = true;
                  print("Replica set already initialized.");
                } catch (e) {}

                if (!initialized) {
                  print("Initializing replica set...");
                  rs.initiate(config);
                }
              '

              echo "✅ Replica set initialization completed."