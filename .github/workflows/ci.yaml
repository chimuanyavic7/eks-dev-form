name: Todo app CI + GitOps (ArgoCD)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.txt'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

# ---------------- CI ----------------
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4


# ---------------- VERSION ----------------
  version:
    name: Versioning
    runs-on: ubuntu-latest
    needs: ci

    outputs:
      version: ${{ steps.bump.outputs.version }}
      release: ${{ steps.bump.outputs.release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # important: needed to access tags

      - name: Get latest version tag
        id: last_version
        run: |
          git fetch --tags

          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [[ -z "$LAST_TAG" ]]; then
            LAST_TAG="v1.0.0"
          fi

          echo "last=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Bump version
        id: bump
        run: |
          LAST=${{ steps.last_version.outputs.last }}
          VERSION=${LAST#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          commit_message=$(git log -1 --pretty=%B)

          RELEASE=false

          if [[ "$commit_message" == major:* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            RELEASE=true

          elif [[ "$commit_message" == minor:* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            RELEASE=true

          elif [[ "$commit_message" == patch:* ]]; then
            PATCH=$((PATCH + 1))
            RELEASE=true
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release=$RELEASE" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.bump.outputs.release == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}

# ---------------- DOCKER ----------------
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: version

    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}/frontend-dev:${{ env.VERSION }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}/backend-dev:${{ env.VERSION }}


# ---------------- HELM VALIDATION ----------------
  validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    needs: [docker, version]

    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/todo-app

      - name: Helm template test
        run: |
          helm template helm/todo-app \
            --set frontend.tag=${{ needs.version.outputs.version }} \
            --set backend.tag=${{ needs.version.outputs.version }}


# ---------------- GITOPS ----------------
  gitops:
    name: Update ArgoCD Repo
    runs-on: ubuntu-latest
    needs: [validate, version]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: chimuanyavic7/eks-dev-form
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      - name: Update Helm values
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Updating version: $VERSION"

          yq eval -i ".frontend.tag = \"$VERSION\"" helm/todo-app/values.yaml
          yq eval -i ".backend.tag = \"$VERSION\"" helm/todo-app/values.yaml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/todo-app/values.yaml

          git diff --cached --quiet && echo "No changes to commit" && exit 0 sure

          git commit -m "deploy: ${{ needs.version.outputs.version }}"
          git push origin main