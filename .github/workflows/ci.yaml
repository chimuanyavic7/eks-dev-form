name: Todo app with GitOps (ArgoCD)

permissions:
  contents: write
  
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

# ---------------- CI ----------------
  ci:
    name: Build code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4


# ---------------- VERSIONING ----------------
  version:
    name: Calculate next version
    runs-on: ubuntu-latest
    needs: ci

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semantic version
        id: ver
        run: |
          git fetch --tags

          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi

          VERSION=${LATEST_TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))

          if [ "$PATCH" -gt 9 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"

          echo "Generated version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT


# ---------------- DOCKER BUILD ----------------
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: version

    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ env.IMAGE_NAME }}/frontend-dev:${{ env.VERSION }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ env.IMAGE_NAME }}/backend-dev:${{ env.VERSION }}


# ---------------- CREATE GIT TAG ----------------
  tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: [docker, version]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          VERSION="${{ needs.version.outputs.version }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $VERSION
          git push origin $VERSION


# ---------------- HELM VALIDATION ----------------
  validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    needs: [docker, version]

    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/todo-app

      - name: Helm template validation
        run: |
          helm template helm/todo-app \
            --set frontend.tag=${{ needs.version.outputs.version }} \
            --set backend.tag=${{ needs.version.outputs.version }}


# ---------------- GITOPS UPDATE ----------------
  gitops:
    name: Update ArgoCD Repo
    runs-on: ubuntu-latest
    needs: [validate, version]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: chimuanyavic7/eks-dev-form
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      - name: Update Helm values
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Updating deployment version: $VERSION"

          yq -i ".frontend.tag = strenv(VERSION)" helm/todo-app/values.yaml
          yq -i ".backend.tag = strenv(VERSION)" helm/todo-app/values.yaml

      - name: Commit & push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/todo-app/values.yaml

          git commit -m "chore: deploy ${{ needs.version.outputs.version }}" || echo "no changes"

          git push