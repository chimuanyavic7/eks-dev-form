name: Todo app CI + GitOps (ArgoCD)

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

# ---------------- CI ----------------
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4


# ---------------- VERSION ----------------
  version:
    name: Generate version
    runs-on: ubuntu-latest
    needs: ci

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # important: fetch all tags

    - name: Get latest tag
      id: get_tag
      run: |
        # Get latest tag or fallback to v1.0.0
        LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

        if [ -z "$LATEST_TAG" ]; then
          LATEST_TAG="v1.0.0"
        fi

        echo "Latest tag: $LATEST_TAG"
        echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Increment version
      id: version
      run: |
        LATEST=${{ steps.get_tag.outputs.tag }}

        # remove "v"
        VERSION=${LATEST#v}

        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        # increase patch version
        PATCH=$((PATCH + 1))

        NEW_VERSION="v$MAJOR.$MINOR.$PATCH"

        echo "New version: $NEW_VERSION"
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

# ---------------- HELM VALIDATION ----------------
  validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    needs: [docker, version]

    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/todo-app

      - name: Helm template test
        run: |
          helm template helm/todo-app \
            --set frontend.tag=${{ needs.version.outputs.version }} \
            --set backend.tag=${{ needs.version.outputs.version }}


# ---------------- GITOPS ----------------
  gitops:
    name: Update ArgoCD Repo
    runs-on: ubuntu-latest
    needs: [validate, version]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: chimuanyavic7/eks-dev-form
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      - name: Update Helm values
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Updating deployment version: $VERSION"

          export VERSION

          yq eval -i '.frontend.tag = strenv(VERSION)' helm/todo-app/values.yaml
          yq eval -i '.backend.tag = strenv(VERSION)' helm/todo-app/values.yaml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/todo-app/values.yaml
          git commit -m "deploy: ${{ needs.version.outputs.version }}" || echo "no changes"
          git push



   # ---------------- DOCKER ----------------
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: version

    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}/frontend-dev:${{ env.VERSION }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}/backend-dev:${{ env.VERSION }}
       