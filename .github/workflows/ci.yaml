name: Todo app with GitOps (ArgoCD)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

# ---------------- CI / PREP ----------------
  ci:
    name: Build code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


# ---------------- VERSION ----------------
  version:
    name: Extract version
    runs-on: ubuntu-latest
    needs: ci

    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - id: v
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF_NAME}
          else
            VERSION=latest
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT


# ---------------- BUILD & PUSH ----------------
  docker:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: version

    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        run: |
          docker build -t $IMAGE_NAME/frontend-dev:$VERSION frontend
          docker push $IMAGE_NAME/frontend-dev:$VERSION

      - name: Build & push backend
        run: |
          docker build -t $IMAGE_NAME/backend-dev:$VERSION backend
          docker push $IMAGE_NAME/backend-dev:$VERSION


# ---------------- VALIDATION ----------------
  validate:
    name: Validate Helm & K8s
    runs-on: ubuntu-latest
    needs: [docker, version]

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4

      - name: Helm lint
        run: helm lint helm/todo-app

      - name: K8s dry-run
        run: |
          helm template helm/todo-app \
            --set image.tag=${{ needs.version.outputs.version }} \
          | kubectl apply --dry-run=client -f -


# ---------------- GITOPS ----------------
  gitops:
    name: Update ArgoCD Repo
    runs-on: ubuntu-latest
    needs: [validate, version]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: your-org/gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update Helm values
        run: |
          VERSION=${{ needs.version.outputs.version }}
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" helm/todo-app/values.yaml

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update image tag to ${VERSION}" || exit 0
          git push
