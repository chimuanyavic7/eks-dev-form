name: Todo app with GitOps (ArgoCD)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

# ---------------- CI ----------------
   build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
   

# ---------------- VERSION ----------------
  version:
    name: extract-version
    runs-on: ubuntu-latest
    needs: ci

    outputs:
      version: ${{ steps.v.outputs.version }}

    steps:
      - id: v
        run: |
          VERSION=${GITHUB_REF_NAME}
          echo "version=$VERSION" >> $GITHUB_OUTPUT


# ---------------- BUILD & PUSH ----------------
  docker:
    name: build-push
    runs-on: ubuntu-latest
    needs: version

    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # FRONTEND IMAGE
      - name: Build & push frontend
        run: |
          docker build -t ${{ env.IMAGE_NAME }}/frontend-dev:$VERSION frontend
          docker push ${{ env.IMAGE_NAME }}/frontend-dev:$VERSION

      # BACKEND IMAGE
      - name: Build & push backend
        run: |
          docker build -t ${{ env.IMAGE_NAME }}/backend-dev:$VERSION backend
          docker push ${{ env.IMAGE_NAME }}/backend-dev:$VERSION


# ---------------- VALIDATION ----------------
  validate:
    name: validate-helm-and-k8s
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4

      - name: Helm lint
        run: helm lint helm/todo-app

      - name: K8s dry-run
        run: |
          helm template helm/todo-app \
            --set image.tag=${{ needs.version.outputs.version }} \
          | kubectl apply --dry-run=client -f -


# ---------------- GITOPS ----------------
  gitops:
    name: update-argocd
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
        with:
          repository: your-org/gitops-repo
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update Helm values
        run: |
          VERSION=${{ needs.version.outputs.version }}
          sed -i "s/tag:.*/tag: \"${VERSION}\"/" helm/todo-app/values.yaml

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "update image tag to ${VERSION}" || exit 0
          git push
