name: Todo app CI + GitOps (ArgoCD)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.txt'  
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

# ---------------- CI ----------------
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4


# ---------------- VERSION (FIXED) ----------------
  version:
    name: Generate version
    runs-on: ubuntu-latest
    needs: ci

    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED 

      - name: Generate next version from GitOps repo
        id: ver
        run: |
          git fetch origin main

          CURRENT=$(yq eval '.frontend.tag' helm/todo-app/values.yaml)
          echo "Current version: $CURRENT"

          VERSION=${CURRENT#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))

          if [ "$PATCH" -gt 9 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          if [ "$MINOR" -gt 9 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi

          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"

          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

# ---------------- DOCKER (FIXED) ----------------
  docker:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: version

    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}/frontend-dev:${{ env.VERSION }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}/backend-dev:${{ env.VERSION }}


# ---------------- HELM VALIDATION ----------------
  validate:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint helm/todo-app

      - name: Helm template test
        run: |
          helm template helm/todo-app \
            --set frontend.tag=${{ needs.version.outputs.version }} \
            --set backend.tag=${{ needs.version.outputs.version }}


# ---------------- GITOPS ----------------
  gitops:
    name: Update ArgoCD Repo
    runs-on: ubuntu-latest
    needs: [validate, version]

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: chimuanyavic7/eks-dev-form
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      - name: Update Helm values
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Updating version: $VERSION"

          yq eval -i ".frontend.tag = \"$VERSION\"" helm/todo-app/values.yaml
          yq eval -i ".backend.tag = \"$VERSION\"" helm/todo-app/values.yaml

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/todo-app/values.yaml
          git commit -m "deploy: ${{ needs.version.outputs.version }}" || echo "no changes"
          git push origin main