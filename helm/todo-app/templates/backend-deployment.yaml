apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: eks-project 
spec:
  replicas: {{.values.backend.replicas}}
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: chimuanyavic7/backend-dev:{{ .values.backend.tag }}
          ports:
            - containerPort: 3500

          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key:  MONGODB_URI

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: PORT
~
